# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: deepshield
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: VIT_ONLY
        value: "1"
      - key: MAX_FRAMES
        value: "5"
      - key: OMP_NUM_THREADS
        value: "1"
      - key: MKL_NUM_THREADS
        value: "1"
      - key: HF_HOME
        value: /tmp/hf_cache
      - key: TRANSFORMERS_CACHE
        value: /tmp/hf_cache
