# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: deepshield
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: HF_HOME
        value: /tmp/hf_cache
      - key: TRANSFORMERS_CACHE
        value: /tmp/hf_cache
